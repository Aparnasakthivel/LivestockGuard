version: '3.9'
services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: livestockguard
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/livestockguard
      JWT_SECRET: supersecretkey
      S3_BUCKET: your-bucket-name
      S3_REGION: your-region
      S3_ACCESS_KEY: your-access-key
      S3_SECRET_KEY: your-secret-key
      AI_SERVICE_URL: http://ai-service:8001
    depends_on:
      - db
      - ai-service
    ports:
      - '5000:5000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      VITE_API_URL: http://localhost:5000/api

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - '8001:8001'

volumes:
  db_data:
